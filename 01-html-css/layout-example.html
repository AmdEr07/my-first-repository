<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loyout</title>
</head>
<body>
    <h3>Elemento tipo span (display inline)</h3>
    <span>Este es un span</span></span>
    <span>Y aqui empieza otro span</span>

    <h3>Elemento tipo div (display block)</h3>
    <div>Este es un div</div>
    <div>Este es un div que es mas largo</div>

    <h3>Elemento tipo div (display inline-block)</h3>
    <div class="inline-block-div">Primer div inline-block</div>
    <div class="inline-block-div">Y segundo div inline-block</div>
</body>
</html>

<style>
    span {
        border: 1px solid black;
        width: 600px;
    }

    div {
        border: 1px solid black;
        width: 300px;
    }

    .inline-block-div {
        display: inline-block;
    }

</style>
