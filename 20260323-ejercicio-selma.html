<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio JavaScript</title>
</head>
<body>
  <h1>Ejercicio de JavaScript</h1>

  <script>
    // Constante con el nombre
    const nombre = "Amanda";

    // Variable numérica con la edad
    let edad = 43;

    // Variable booleana que indica si te gusta programar
    let gustaProgramar = true;

    // Construimos un mensaje usando las variables
    let mensaje = "Hola, me llamo " + nombre +
                  ", tengo " + edad +
                  " años y me gusta programar: " + gustaProgramar;

    // Mostramos el mensaje en la consola
    console.log(mensaje);
  </script>
</body>
</html>
