<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Navbar</title>

  <style>
    .navbar {
      display: flex;
      align-items: center;
      border: 2px solid #ccc;
      padding: 5px;
      background-color: #e9d9e5;
      
    }

    .menu {
      display: flex;
      list-style: none;
      gap: 15px;
      
    }

    .menu a {
      text-decoration: none;
      color: black;
      font-weight: bold; /* 👈 esto lo pone en negrita */
      
    }

    .logo {
       width: 70px;
      height: 50px;
      background-color: #18d469;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 20px;
      font-size: 12px;
      
    }

    .login {
      margin-left: auto;
      border: none;
      color: white;
      border-radius: 4px;
      background-color: blue;
      padding: 5px 10px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">70 × 50</div>

    <ul class="menu">
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Cursos</a></li>
      <li><a href="#">Contacto</a></li>
    </ul>

    <button class="login">Login</button>
  </nav>

</body>
</html>
